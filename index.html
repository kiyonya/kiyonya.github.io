<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0," />
    <title>Kiyuu</title>
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <div class="background">
      <img
        src="./static/img/background.webp"
        alt="background"
        class="img bgimg"
      />
      <div class="mask"></div>
    </div>
    <div class="title">
      <img src="./static/img/paperplane.png" alt="plane" class="plane" />
      <h4 class="text">Kiyuu Home</h4>
    </div>
    <div class="me">
      <div class="avatar-container">
        <img
          src="https://avatars.githubusercontent.com/u/189569458"
          alt="avatar blur"
          class="blur-layer"
        />
        <img
          src="https://avatars.githubusercontent.com/u/189569458"
          alt="Kiyuu avatar"
          class="avatar"
        />
      </div>
      <h2 class="name">I'm Kiyuu</h2>
      <p class="bio">Amateur developer | I make something fun.</p>
      <div class="contacts">
        <a
          href="https://github.com/kiyonya/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="./static/img/github.png" alt="github" class="logo" />
        </a>
      </div>
    </div>
    <footer class="footer">
      <span>©2026 Kiyuu</span>
    </footer>
    <script src="./static/js/bios.js"></script>
    <script>
      const MAX_TD = 30
      const bgimg = document.querySelector('.bgimg')
      const bio = document.querySelector('.bio')
      const handleDocumentMouseMove = event => {
        const ww = window.innerWidth
        const wh = window.innerHeight
        const cx = event.clientX
        const cy = event.clientY
        const centerX = ww / 2
        const centerY = wh / 2
        const dx = (centerX - cx) / centerX
        const dy = (centerY - cy) / centerY
        const transX = MAX_TD * dx
        const transY = MAX_TD * dy
        bgimg.style.transform = `translate3d(${transX}px, ${transY}px, 0) scale(1.1)`
      }
      const handleDocumentMouseLeave = () => {
        bgimg.style.transform = `translate3d(0px, 0px, 0)`
      }
      const handleBioClick = () => {
        const ri = Math.floor(Math.random() * bios.length)
        bio.innerHTML = bios[ri]
      }
      window.onload = () => {
        document.addEventListener('mousemove', handleDocumentMouseMove)
        document.addEventListener('mouseleave', handleDocumentMouseLeave)
        bio.innerHTML = bios[0]
        bio.addEventListener('click', handleBioClick)
      }
    </script>
  </body>
</html>
